services:
  api:
    build: .
    container_name: mlops-churn-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_ENV: docker
      LOG_LEVEL: INFO
      MODEL_VERSION: 1.0.0
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  dashboard:
    build: .
    container_name: mlops-churn-dashboard
    command: streamlit run dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      APP_ENV: docker
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
