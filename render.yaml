services:
  - type: web
    name: mlops-churn-api
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt && python model/train_model.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MODEL_VERSION
        value: 1.0.0
      - key: CORS_ORIGINS
        value: "*"
